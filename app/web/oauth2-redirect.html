<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Signing in…</title></head>
<body>
<p style="font-family:system-ui,sans-serif;text-align:center;margin-top:40vh;color:#555">Signing you in…</p>
<script>
  (function () {
    var hash = window.location.hash || '';
    var params = {};
    hash.replace(/^#/, '').split('&').forEach(function (p) {
      var i = p.indexOf('=');
      if (i < 0) return;
      try {
        params[decodeURIComponent(p.slice(0, i))] = decodeURIComponent(p.slice(i + 1));
      } catch (e) {}
    });

    // Desktop popup flow — postMessage back to opener.
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage({ source: 'autoapply-google-oauth', hash: hash }, window.location.origin);
        window.close();
        return;
      } catch (e) {}
    }

    // Full-page redirect flow (mobile / in-app browsers).
    var pending = null;
    try {
      pending = JSON.parse(sessionStorage.getItem('autoapply_google_oauth_pending') || 'null');
    } catch (e) {}

    var payload;
    if (params.error) {
      payload = { error: params.error };
    } else if (pending && params.state && pending.state !== params.state) {
      payload = { error: 'state_mismatch' };
    } else {
      payload = { id_token: params.id_token || '', state: params.state || '' };
    }

    try {
      sessionStorage.setItem('autoapply_google_oauth_result', JSON.stringify(payload));
      sessionStorage.removeItem('autoapply_google_oauth_pending');
    } catch (e) {}

    window.location.replace(window.location.origin + '/login');
  })();
</script>
</body></html>
