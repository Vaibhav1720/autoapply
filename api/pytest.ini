[pytest]
pythonpath = .
# Custom markers used by the suite.
markers =
    regression: offline matcher-quality regression test (replays frozen
        golden snapshots in api/eval/golden/; fast + free + deterministic).
        Refresh snapshots with `python -m eval.capture_golden`.
    live: integration tests that call live company career sites (slow/flaky;
        excluded from CI via `-m "not live"`).

# Regression tests are now FAST + FREE (offline replay), so they run by
# default with the rest of the suite.
