# LiteLLM proxy — Cursor Agent (OpenAI-compatible) → AWS Bedrock
# Start: bash tools/litellm/start-proxy.sh

model_list:
  - model_name: qwen-coder
    litellm_params:
      model: bedrock/qwen.qwen3-coder-480b-a35b-v1:0
      aws_region_name: eu-north-1

  - model_name: deepseek
    litellm_params:
      model: bedrock/deepseek.deepseek-v3-2-v1:0
      aws_region_name: eu-north-1

  - model_name: glm
    litellm_params:
      model: bedrock/zai.glm-4.7
      aws_region_name: eu-north-1

general_settings:
  master_key: sk-litellm-local

litellm_settings:
  drop_params: true
  set_verbose: false
