<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AutoApply</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; background: #fff; color: #111827; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h1 span.brand { color: #4F46E5; }
    h1 .ver { font-size: 10px; color: #9CA3AF; font-weight: 400; margin-left: 4px; }
    h2 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #374151; }
    .status { font-size: 12px; padding: 6px 10px; border-radius: 6px; margin-bottom: 12px; }
    .status.ok { background: #ECFDF5; color: #065F46; }
    .status.err { background: #FEF2F2; color: #991B1B; }
    .status.info { background: #EFF6FF; color: #1E40AF; }
    .group { margin-bottom: 10px; }
    label { font-size: 11px; color: #6B7280; display: block; margin-bottom: 4px; font-weight: 500; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 13px; background: #fff; }
    input:focus, select:focus { outline: none; border-color: #4F46E5; box-shadow: 0 0 0 2px rgba(79,70,229,0.1); }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: opacity .15s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #4F46E5; color: #fff; }
    .btn-smart { background: #059669; color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #D1D5DB; color: #374151; }
    .btn-danger { background: transparent; border: 1px solid #EF4444; color: #EF4444; font-size: 12px; padding: 6px; }
    .divider { border-top: 1px solid #E5E7EB; margin: 12px 0; }
    .footer { font-size: 11px; color: #9CA3AF; text-align: center; }
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #E5E7EB; }
    .tab { flex: 1; padding: 8px 4px; font-size: 12px; font-weight: 600; background: transparent; border: none; cursor: pointer; color: #6B7280; border-bottom: 2px solid transparent; }
    .tab.active { color: #4F46E5; border-bottom-color: #4F46E5; }
    .profile-card { background: #F9FAFB; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 12px; }
    .profile-card .name { font-weight: 600; color: #111827; font-size: 13px; }
    .profile-card .email { color: #6B7280; }
    .progress { height: 4px; background: #E5E7EB; border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: #4F46E5; transition: width .3s; }
    .small { font-size: 11px; color: #6B7280; }
    .icon-btn { background: transparent; border: none; cursor: pointer; padding: 4px; color: #6B7280; font-size: 14px; }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>⚡ <span class="brand">AutoApply</span><span class="ver">v1.6.15</span></h1>
    <button id="btnSettings" class="icon-btn" title="Settings">⚙</button>
  </div>

  <div id="status" class="status info">Loading…</div>

  <!-- =============== AUTH (signed-out) =============== -->
  <div id="authBlock" style="display:none">
    <div style="text-align:center;padding:14px 4px 18px">
      <div style="font-size:13px;color:#374151;margin-bottom:14px">
        Sign in with Google to start autofilling job applications.
      </div>
      <button id="btnGoogleLogin" class="btn" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1f2937;border:1px solid #D1D5DB;font-weight:500">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16.1 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 7.1 29.5 5 24 5 16.3 5 9.7 9 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.3 0 10.1-2 13.7-5.3l-6.3-5.2C29.3 35 26.8 36 24 36c-5.2 0-9.6-3.1-11.3-7.5l-6.5 5C9.5 39.9 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.6l6.3 5.2C41.9 35.4 44 29.9 44 24c0-1.3-.1-2.4-.4-3.5z"/>
        </svg>
        Sign in with Google
      </button>
    </div>

    <div class="divider"></div>
    <details style="display:none">
      <summary class="small" style="cursor:pointer">Advanced: paste an existing JWT</summary>
      <div class="group" style="margin-top:8px">
        <input id="manualToken" type="password" placeholder="JWT token">
      </div>
      <button id="btnSaveToken" class="btn btn-outline">Save token</button>
    </details>
  </div>

  <!-- =============== SIGNED-IN =============== -->
  <div id="mainBlock" style="display:none">
    <div class="profile-card">
      <div class="name" id="userName">—</div>
      <div class="email" id="userEmail">—</div>
      <div class="small" id="completenessText" style="margin-top:6px">Loading…</div>
    </div>

    <div id="missingBanner" style="display:none;background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px;color:#92400E">
      <div style="font-weight:600;margin-bottom:4px">⚠️ Profile incomplete</div>
      <div id="missingList" style="margin-bottom:8px"></div>
      <button id="btnFixMissing" class="btn btn-primary" style="margin-bottom:0;padding:6px;font-size:12px">Fill missing details →</button>
    </div>

    <button id="btnSmartFill" class="btn btn-smart">⚡ Autofill with AI</button>

    <div class="divider"></div>
    <button id="btnOpenOptions" class="btn btn-outline">📝 Edit profile / Upload resume</button>
    <button id="btnLogout" class="btn btn-danger">Sign out</button>
  </div>

  <!-- =============== SETTINGS =============== -->
  <div id="settingsBlock" style="display:none">
    <h2>Settings</h2>
    <div class="group">
      <label>API Base URL</label>
      <input id="apiBase" type="text" placeholder="https://your-backend.azurewebsites.net">
      <div class="small" style="margin-top:4px">Self-hosting? Point to your own AutoApply backend.</div>
    </div>
    <button id="btnSaveSettings" class="btn btn-primary">Save</button>
    <button id="btnResetSettings" class="btn btn-outline">Reset to default</button>
    <div class="divider"></div>
    <button id="btnCloseSettings" class="btn btn-outline">← Back</button>
  </div>

  <div class="divider"></div>
  <div class="footer">
    <a id="privacyLink" href="#" target="_blank" style="color:#6B7280">Privacy</a>
    · Works on any job application form
  </div>

  <script src="popup.js"></script>
</body>
</html>
